name: Deploy Playground

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-playground.yml"
      - "playground/**"
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "vite.config.ts"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy playground Worker
    if: github.repository == vars.RELEASE_REPOSITORY
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Build playground
        run: cd playground && vp build

      - name: Dry-run generated Worker deploy
        run: cd playground && vp exec wrangler deploy --dry-run --config dist/agent_skills_ts_sdk_playground/wrangler.json

      - name: Confirm Cloudflare deploy token is configured
        if: env.CLOUDFLARE_API_TOKEN == ''
        run: |
          echo "::warning title=Cloudflare deploy skipped::Set the CLOUDFLARE_API_TOKEN repository secret to enable production deploys."

      - name: Deploy generated Worker
        if: env.CLOUDFLARE_API_TOKEN != ''
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          command: deploy --config dist/agent_skills_ts_sdk_playground/wrangler.json
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          workingDirectory: playground
          wranglerVersion: "4"
